<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0047b3"/>
    </linearGradient>
    <linearGradient id="user-band" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162031" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0e1729" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="kernel-band" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2540" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f1a30" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bpfmap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0047b3"/>
      <stop offset="100%" stop-color="#001f4d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00aaff"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#00aaff" stroke-width="1" fill="none">
    <path d="M0 0 H1200 M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200 M0 800 H1200 M0 900 H1200"/>
    <path d="M0 0 V900 M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900"/>
  </g>

  <g font-family="ui-monospace, Menlo, Consolas, monospace">
    <text x="60" y="55" fill="#00aaff" font-size="14" letter-spacing="3" opacity="0.8">SYSTEM_ARCHITECTURE // AEGIS-BPF</text>
    <text x="60" y="78" fill="#94a3b8" font-size="12" letter-spacing="1">eBPF + CO-RE LSM enforcement · kernel-level security policy</text>
  </g>

  <g transform="translate(60, 110)">
    <rect width="1080" height="320" rx="10" fill="url(#user-band)" stroke="#2a3548" stroke-width="1.5"/>
    <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#94a3b8" font-size="12" letter-spacing="3" opacity="0.9">USER_SPACE</text>

    <g transform="translate(40, 60)">
      <rect width="200" height="76" rx="6" fill="#161c2e" stroke="#2a3548"/>
      <text x="100" y="32" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">File / Net Deny</text>
      <text x="100" y="54" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">policy.yml</text>
    </g>
    <g transform="translate(260, 60)">
      <rect width="200" height="76" rx="6" fill="#161c2e" stroke="#2a3548"/>
      <text x="100" y="32" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">Allowlist</text>
      <text x="100" y="54" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">trusted binaries</text>
    </g>
    <g transform="translate(480, 60)">
      <rect width="200" height="76" rx="6" fill="#161c2e" stroke="#2a3548"/>
      <text x="100" y="32" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">Policy + Signing</text>
      <text x="100" y="54" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">ed25519 verify</text>
    </g>
    <g transform="translate(700, 60)">
      <rect width="160" height="76" rx="6" fill="#161c2e" stroke="#2a3548"/>
      <text x="80" y="32" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">Metrics</text>
      <text x="80" y="54" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">Prometheus</text>
    </g>
    <g transform="translate(880, 60)">
      <rect width="160" height="76" rx="6" fill="#161c2e" stroke="#2a3548"/>
      <text x="80" y="32" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">Plugins</text>
      <text x="80" y="54" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">custom rules</text>
    </g>

    <g stroke="#94a3b8" stroke-width="1.4" fill="none" opacity="0.5">
      <path d="M140 136 V 200" marker-end="url(#arrow-soft)"/>
      <path d="M360 136 V 200" marker-end="url(#arrow-soft)"/>
      <path d="M580 136 V 200" marker-end="url(#arrow-soft)"/>
      <path d="M780 136 V 200" marker-end="url(#arrow-soft)"/>
      <path d="M960 136 V 200" marker-end="url(#arrow-soft)"/>
    </g>

    <g transform="translate(290, 200)">
      <rect width="500" height="90" rx="8" fill="url(#bpfmap)" stroke="#3b82f6" stroke-width="2"/>
      <text x="250" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Pinned BPF Maps + Ring Buffer</text>
      <text x="250" y="64" text-anchor="middle" fill="#bfdbfe" font-size="13" font-family="ui-monospace, Menlo, Consolas, monospace">/sys/fs/bpf/aegis/* · zero-copy events</text>
    </g>
  </g>

  <g stroke="#00aaff" stroke-width="2.5" fill="none">
    <path d="M540 430 V 480" marker-end="url(#arrow)"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" fill="#00aaff" font-size="11" letter-spacing="3">
    <text x="600" y="460" fill="#94a3b8" opacity="0.85">PINNED · SYSCALLS</text>
  </g>

  <g transform="translate(60, 480)">
    <rect width="1080" height="380" rx="10" fill="url(#kernel-band)" stroke="#1f2a44" stroke-width="1.5"/>
    <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#00aaff" font-size="12" letter-spacing="3" opacity="0.9">LINUX_KERNEL</text>

    <g transform="translate(280, 60)">
      <rect width="520" height="70" rx="6" fill="#1a2540" stroke="#3a4a6b" stroke-width="1.5"/>
      <text x="260" y="30" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="500">LSM Hooks · Enforce / Audit</text>
      <text x="260" y="54" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">CO-RE · portable across kernels ≥ 5.7</text>
    </g>

    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" letter-spacing="1">
      <g transform="translate(60, 160)">
        <rect width="240" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">FILESYSTEM</text>
        <text x="20" y="44" fill="#ffffff">file_open · inode_perm</text>
      </g>
      <g transform="translate(320, 160)">
        <rect width="240" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">OVERLAY</text>
        <text x="20" y="44" fill="#ffffff">inode_copy_up</text>
      </g>
      <g transform="translate(580, 160)">
        <rect width="240" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">EXEC</text>
        <text x="20" y="44" fill="#ffffff">bprm_check + IMA hash</text>
      </g>
      <g transform="translate(840, 160)">
        <rect width="180" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">SOCKET</text>
        <text x="20" y="44" fill="#ffffff">connect / bind</text>
      </g>

      <g transform="translate(60, 226)">
        <rect width="240" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">SOCKET</text>
        <text x="20" y="44" fill="#ffffff">listen / accept</text>
      </g>
      <g transform="translate(320, 226)">
        <rect width="240" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">SOCKET</text>
        <text x="20" y="44" fill="#ffffff">sendmsg / recvmsg</text>
      </g>
      <g transform="translate(580, 226)">
        <rect width="440" height="56" rx="4" fill="#0f1525" stroke="#2a3548"/>
        <text x="20" y="24" fill="#00aaff" font-size="11" letter-spacing="2">PROCESS</text>
        <text x="20" y="44" fill="#ffffff">openat · exec · fork · exit (tracepoint fallback)</text>
      </g>
    </g>

    <g stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.4">
      <line x1="180" y1="130" x2="180" y2="160"/>
      <line x1="440" y1="130" x2="440" y2="160"/>
      <line x1="700" y1="130" x2="700" y2="160"/>
      <line x1="900" y1="130" x2="900" y2="160"/>
    </g>

    <g transform="translate(60, 310)">
      <rect width="960" height="56" rx="6" fill="#1a132a" stroke="#52337f" stroke-width="1.5"/>
      <text x="20" y="24" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#a78bfa" font-size="11" letter-spacing="3">VERDICT</text>
      <text x="20" y="44" fill="#ffffff" font-size="14">ALLOW · DENY · AUDIT_ONLY → returned to LSM, event streamed via ring buffer to user space</text>
    </g>
  </g>

  <rect x="0" y="894" width="1200" height="6" fill="url(#accent)"/>
</svg>
