    <text x="798" y="162" text-anchor="middle">JSON</text>
  </g>

  <line x1="1010" y1="214" x2="1010" y2="270" stroke="#00aaff" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(60, 270)">
    <rect width="1080" height="500" rx="10" fill="url(#ensemble)" stroke="#1f2a44" stroke-width="1.5" stroke-dasharray="0"/>
    <text x="20" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#00aaff" font-size="12" letter-spacing="3" opacity="0.8">INFERENCE_ENGINE</text>

    <g transform="translate(390, 60)">
