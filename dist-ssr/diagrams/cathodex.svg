      <text x="150" y="34" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="500">Pymatgen Parser</text>
      <text x="150" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">structure → graph</text>
    </g>

    <line x1="540" y1="138" x2="540" y2="180" stroke="#00aaff" stroke-width="2" marker-end="url(#arrow)"/>

    <g font-family="ui-monospace, Menlo, Consolas, monospace" fill="#94a3b8" font-size="11" letter-spacing="2">
      <text x="540" y="200" text-anchor="middle">MACE_ENSEMBLE · 5 MEMBERS</text>
    </g>

    <g transform="translate(60, 220)" font-family="Inter, ui-sans-serif, sans-serif">
      <g>
        <rect x="0" y="0" width="180" height="84" rx="6" fill="#161c2e" stroke="#2a3548"/>
        <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="500">MACE-1</text>
        <text x="90" y="58" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">GNN model</text>
      </g>
      <g transform="translate(195, 0)">
        <rect width="180" height="84" rx="6" fill="#161c2e" stroke="#2a3548"/>
        <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="500">MACE-2</text>
        <text x="90" y="58" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">GNN model</text>
      </g>
      <g transform="translate(390, 0)">
        <rect width="180" height="84" rx="6" fill="#161c2e" stroke="#2a3548"/>
        <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="500">MACE-3</text>
        <text x="90" y="58" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">GNN model</text>
      </g>
      <g transform="translate(585, 0)">
        <rect width="180" height="84" rx="6" fill="#161c2e" stroke="#2a3548"/>
        <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="500">MACE-4</text>
        <text x="90" y="58" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">GNN model</text>
      </g>
      <g transform="translate(780, 0)">
        <rect width="180" height="84" rx="6" fill="#161c2e" stroke="#2a3548"/>
        <text x="90" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="500">MACE-5</text>
        <text x="90" y="58" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace, monospace">GNN model</text>
      </g>
    </g>

    <g stroke="#94a3b8" stroke-width="1.4" fill="none" opacity="0.6">
      <path d="M150 304 C 150 360, 540 360, 540 400" marker-end="url(#arrow-soft)"/>
      <path d="M345 304 C 345 360, 540 360, 540 400" marker-end="url(#arrow-soft)"/>
      <path d="M540 304 V400" marker-end="url(#arrow-soft)"/>
      <path d="M735 304 C 735 360, 540 360, 540 400" marker-end="url(#arrow-soft)"/>
      <path d="M930 304 C 930 360, 540 360, 540 400" marker-end="url(#arrow-soft)"/>
    </g>

    <g transform="translate(290, 400)">
      <rect width="500" height="78" rx="6" fill="#1a2540" stroke="#3a4a6b" stroke-width="1"/>
      <text x="250" y="34" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="500">Statistical Aggregation</text>
      <text x="250" y="58" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">q10 · q50 · q90 + conformal prediction</text>
    </g>
  </g>

  <line x1="600" y1="770" x2="600" y2="810" stroke="#00aaff" stroke-width="2" marker-end="url(#arrow)"/>

  <g font-family="Inter, ui-sans-serif, sans-serif">
    <g transform="translate(160, 810)">
      <rect width="240" height="64" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
      <text x="120" y="40" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="600" letter-spacing="2">KEEP</text>
    </g>
    <g transform="translate(480, 810)">
      <rect width="240" height="64" rx="6" fill="#2a230f" stroke="#eab308" stroke-width="1.5"/>
      <text x="120" y="40" text-anchor="middle" fill="#eab308" font-size="20" font-weight="600" letter-spacing="2">MAYBE</text>
    </g>
    <g transform="translate(800, 810)">
      <rect width="240" height="64" rx="6" fill="#2a0f12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="120" y="40" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="600" letter-spacing="2">KILL</text>
    </g>
  </g>

  <rect x="0" y="894" width="1200" height="6" fill="url(#accent)"/>
