<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0047b3"/>
    </linearGradient>
    <linearGradient id="ensemble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0f1525"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00aaff"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#00aaff" stroke-width="1" fill="none">
    <path d="M0 0 H1200 M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200 M0 700 H1200 M0 800 H1200 M0 900 H1200"/>
    <path d="M0 0 V900 M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900 M1200 0 V900"/>
  </g>

  <g font-family="ui-monospace, Menlo, Consolas, monospace">
    <text x="60" y="55" fill="#00aaff" font-size="14" letter-spacing="3" opacity="0.8">SYSTEM_ARCHITECTURE // CATHODEX</text>
    <text x="60" y="78" fill="#94a3b8" font-size="12" letter-spacing="1">AI-powered cathode material screening · GNN ensemble inference pipeline</text>
  </g>

  <g transform="translate(60, 130)">
    <rect width="220" height="84" rx="6" fill="#161c2e" stroke="#2a3548" stroke-width="1"/>
    <text x="110" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="500">User / Chemist</text>
    <text x="110" y="62" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">browser</text>
  </g>

  <g transform="translate(440, 130)">
    <rect width="280" height="84" rx="6" fill="#161c2e" stroke="#2a3548" stroke-width="1"/>
    <text x="140" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="500">Web Frontend</text>
    <text x="140" y="62" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">Next.js · Vercel</text>
  </g>

  <g transform="translate(880, 130)">
    <rect width="260" height="84" rx="6" fill="#161c2e" stroke="#2a3548" stroke-width="1"/>
    <text x="130" y="38" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="500">Inference API</text>
    <text x="130" y="62" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="ui-monospace, Menlo, Consolas, monospace">FastAPI · Render</text>
  </g>

  <g stroke="#00aaff" stroke-width="2" fill="none">
    <line x1="280" y1="172" x2="436" y2="172" marker-end="url(#arrow)"/>
    <line x1="720" y1="172" x2="876" y2="172" marker-end="url(#arrow)"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" fill="#00aaff" font-size="11" letter-spacing="2">
